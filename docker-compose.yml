services:

  # ── LDAP ────────────────────────────────────────────────────────────────────
  openldap:
    build: ./ldap
    container_name: openldap
    environment:
      LDAP_ORGANISATION: "Réseau Local"
      LDAP_DOMAIN: "reseau.local"
      LDAP_ADMIN_PASSWORD: "adminpassword"
      LDAP_TLS: "false"
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    security_opt:
      - no-new-privileges:true
    networks:
      backend:           # LDAP uniquement accessible depuis Keycloak
        ipv4_address: 172.33.1.2

  # ── KEYCLOAK ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: keycloak-reseau
    command: start-dev --import-realm
    environment:
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_SPI_LOGIN_PROTOCOL_OPENID_CONNECT_LEGACY_LOGOUT_REDIRECT_URI: "true"
      KC_DEFAULT_THEME: mastodon
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/theme/mastodon:/opt/keycloak/themes/mastodon:ro
    security_opt:
      - no-new-privileges:true
    depends_on:
      - openldap
    networks:
      backend:           # Keycloak ↔ LDAP
        ipv4_address: 172.33.1.3
      frontend:          # Keycloak ↔ Nginx
        ipv4_address: 172.33.2.3

  # ── MASTODON DB ───────────────────────────────────────────────────────────────
  mastodon_db:
    build: ./postgres
    container_name: mastodon_db
    environment:
      POSTGRES_DB: mastodon_production
      POSTGRES_USER: mastodon
      POSTGRES_PASSWORD: mastodon
    volumes:
      - mastodon_db:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
        -c hba_file=/etc/postgresql/pg_hba.conf
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastodon -d mastodon_production"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      db:                # DB uniquement accessible depuis Mastodon
        ipv4_address: 172.33.3.4

  # ── MASTODON REDIS ────────────────────────────────────────────────────────────
  mastodon_redis:
    image: redis:7-alpine
    container_name: mastodon_redis
    command: redis-server --requirepass redispassword
    volumes:
      - mastodon_redis:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      db:                # Redis uniquement accessible depuis Mastodon
        ipv4_address: 172.33.3.5

  # ── MASTODON DB MIGRATE ───────────────────────────────────────────────────────
  mastodon_db_migrate:
    build:
      context: .
      dockerfile: mastodon/Dockerfile
    container_name: mastodon_db_migrate
    command: bundle exec rails db:prepare
    restart: "no"
    env_file: ./mastodon/.env.production
    extra_hosts:
      - "keycloak.reseau.local:172.33.2.10"
      - "mastodon.reseau.local:172.33.2.10"
    security_opt:
      - no-new-privileges:true
    depends_on:
      mastodon_db:
        condition: service_healthy
      mastodon_redis:
        condition: service_healthy
    networks:
      db:
        ipv4_address: 172.33.3.9

  # ── MASTODON WEB ──────────────────────────────────────────────────────────────
  mastodon_web:
    build:
      context: .
      dockerfile: mastodon/Dockerfile
    container_name: mastodon_web
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b 0.0.0.0"
    env_file: ./mastodon/.env.production
    extra_hosts:
      - "keycloak.reseau.local:172.33.2.10"
      - "mastodon.reseau.local:172.33.2.10"
    volumes:
      - mastodon_system:/opt/mastodon/public/system
    security_opt:
      - no-new-privileges:true
    depends_on:
      mastodon_db_migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
    networks:
      frontend:          # Mastodon ↔ Nginx
        ipv4_address: 172.33.2.6
      db:                # Mastodon ↔ DB/Redis
        ipv4_address: 172.33.3.6

  # ── MASTODON SIDEKIQ ──────────────────────────────────────────────────────────
  mastodon_sidekiq:
    build:
      context: .
      dockerfile: mastodon/Dockerfile
    container_name: mastodon_sidekiq
    command: bundle exec sidekiq
    env_file: ./mastodon/.env.production
    extra_hosts:
      - "keycloak.reseau.local:172.33.2.10"
      - "mastodon.reseau.local:172.33.2.10"
    volumes:
      - mastodon_system:/opt/mastodon/public/system
    security_opt:
      - no-new-privileges:true
    depends_on:
      mastodon_db_migrate:
        condition: service_completed_successfully
    networks:
      frontend:
        ipv4_address: 172.33.2.7
      db:
        ipv4_address: 172.33.3.7

  # ── MASTODON STREAMING ────────────────────────────────────────────────────────
  mastodon_streaming:
    image: ghcr.io/mastodon/mastodon-streaming:v4.3.3
    container_name: mastodon_streaming
    env_file: ./mastodon/.env.production
    environment:
      PORT: "4000"
      DB_SSLMODE: "require"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    security_opt:
      - no-new-privileges:true
    depends_on:
      mastodon_db_migrate:
        condition: service_completed_successfully
    networks:
      frontend:
        ipv4_address: 172.33.2.8
      db:
        ipv4_address: 172.33.3.8

  # ── NGINX ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    depends_on:
      - mastodon_web
      - keycloak
    networks:
      frontend:          # Nginx ↔ Mastodon + Keycloak
        ipv4_address: 172.33.2.10

volumes:
  mastodon_db:
  mastodon_redis:
  mastodon_system:
  keycloak_data:
  openldap_data:
  openldap_config:
  nginx_logs:

networks:
  # Réseau backend — LDAP + Keycloak uniquement (isolé de Mastodon)
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.33.1.0/24

  # Réseau frontend — Nginx + Keycloak + Mastodon
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.33.2.0/24

  # Réseau DB — Mastodon + PostgreSQL + Redis uniquement
  db:
    driver: bridge
    ipam:
      config:
        - subnet: 172.33.3.0/24
