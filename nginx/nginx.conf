events {
    worker_connections 1024;
}

http {
    upstream keycloak {
        server keycloak:8080;
    }

    upstream mastodon {
        server mastodon_web:3000;
    }

    upstream mastodon_streaming {
        server mastodon_streaming:4000;
    }

    # ── Redirect HTTP → HTTPS ────────────────────────────────────────────────
    server {
        listen 80;
        server_name keycloak.reseau.local mastodon.reseau.local;
        return 301 https://$host:8443$request_uri;
    }

    # ── keycloak.reseau.local:8443 ───────────────────────────────────────────
    server {
        listen 8443 ssl;
        server_name keycloak.reseau.local;

        ssl_certificate     /etc/nginx/certs/reseau.local.crt;
        ssl_certificate_key /etc/nginx/certs/reseau.local.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Keycloak needs large buffers for its headers
        proxy_buffer_size       128k;
        proxy_buffers           8 256k;
        proxy_busy_buffers_size 256k;

        location / {
            proxy_pass http://keycloak;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Port   8443;

            # Fix SameSite cookie issue across subdomains during OIDC flow
            proxy_cookie_flags ~ secure samesite=none;
        }
    }

    # ── mastodon.reseau.local:8443 ───────────────────────────────────────────
    server {
        listen 8443 ssl;
        server_name mastodon.reseau.local;

        ssl_certificate     /etc/nginx/certs/reseau.local.crt;
        ssl_certificate_key /etc/nginx/certs/reseau.local.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        client_max_body_size 80m;

        proxy_buffer_size       64k;
        proxy_buffers           8 64k;
        proxy_busy_buffers_size 128k;

        location /api/v1/streaming {
            proxy_pass http://mastodon_streaming;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host:$server_port;
        }

        location / {
            proxy_pass http://mastodon;
            proxy_set_header Host               $host:$server_port;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Port   8443;
        }
    }
}
