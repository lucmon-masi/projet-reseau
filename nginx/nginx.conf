events {
    worker_connections 1024;
}

http {
    # ── Sécurité globale ─────────────────────────────────────────────────────
    server_tokens off;

    # Rate limiting — protège contre brute-force et DoS
    limit_req_zone $binary_remote_addr zone=login:10m  rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=global:10m rate=50r/s;

    # ── Logs ─────────────────────────────────────────────────────────────────
    # Format standard
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

    # Format audit — logins/logouts uniquement
    log_format audit '$time_iso8601 | $remote_addr | $request_method $host$request_uri | '
                     'status=$status | ua="$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # Rétention logs — les logs sont écrits par date, nettoyés après 30 jours
    # (rotation gérée par le script scripts/rotate-logs.sh via cron ou make)

    # ── WebSocket upgrade map ─────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstreams ────────────────────────────────────────────────────────────
    upstream keycloak {
        server keycloak:8080;
    }

    upstream mastodon {
        server mastodon_web:3000;
    }

    upstream mastodon_streaming {
        server mastodon_streaming:4000;
    }

    # ── Redirect HTTP → HTTPS (trafic externe) ──────────────────────────────
    server {
        listen 80;
        server_name mastodon.reseau.local;
        return 301 https://$host$request_uri;
    }

    # ── Proxy interne HTTP pour Mastodon → Keycloak (réseau Docker) ─────────
    # Mastodon contacte Keycloak via ce proxy sur port 80, nginx ajoute les
    # headers X-Forwarded-* pour que Keycloak génère des URLs https correctes
    server {
        listen 80;
        server_name keycloak.reseau.local;

        location / {
            proxy_pass http://keycloak;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Port   443;
        }
    }

    # ── keycloak.reseau.local ────────────────────────────────────────────────
    server {
        listen 8443 ssl;
        listen 443 ssl;
        server_name keycloak.reseau.local;

        ssl_certificate      /etc/nginx/certs/reseau.local.crt;
        ssl_certificate_key  /etc/nginx/certs/reseau.local.key;
        ssl_protocols        TLSv1.3;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # En-têtes de sécurité
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options            SAMEORIGIN always;
        add_header X-Content-Type-Options     nosniff always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
        add_header Cache-Control              "no-store, no-cache, must-revalidate, private" always;

        proxy_buffer_size       128k;
        proxy_buffers           8 256k;
        proxy_busy_buffers_size 256k;

        # Audit log sur les endpoints login/logout Keycloak
        location ~ ^/realms/[^/]+/protocol/openid-connect/(token|auth|logout) {
            access_log /var/log/nginx/audit.log audit;
            limit_req zone=login burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://keycloak;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Port   443;
            proxy_cookie_flags ~ secure samesite=none;
        }

        location / {
            limit_req zone=global burst=50 nodelay;

            proxy_pass http://keycloak;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Port   443;
            proxy_cookie_flags ~ secure samesite=none;
        }
    }

    # ── mastodon.reseau.local ────────────────────────────────────────────────
    server {
        listen 8443 ssl;
        listen 443 ssl;
        server_name mastodon.reseau.local;

        ssl_certificate      /etc/nginx/certs/reseau.local.crt;
        ssl_certificate_key  /etc/nginx/certs/reseau.local.key;
        ssl_protocols        TLSv1.3;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        client_max_body_size 80m;

        # En-têtes de sécurité
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options            SAMEORIGIN always;
        add_header X-Content-Type-Options     nosniff always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy    "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: https://mastodon.reseau.local; font-src 'self' data: https:; connect-src 'self' wss://mastodon.reseau.local https:; media-src 'self' data: blob: https:; frame-ancestors 'self';" always;

        proxy_buffer_size       64k;
        proxy_buffers           8 64k;
        proxy_busy_buffers_size 128k;

        # Streaming WebSocket
        location /api/v1/streaming {
            proxy_pass http://mastodon_streaming;
            proxy_http_version 1.1;
            proxy_set_header Upgrade              $http_upgrade;
            proxy_set_header Connection           $connection_upgrade;
            proxy_set_header Host                 $host;
            proxy_set_header X-Real-IP            $remote_addr;
            proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto    https;
            proxy_read_timeout                    86400;
        }

        # Audit log sur sign-in/sign-out Mastodon
        location ~ ^/auth/(sign_in|sign_out|choose_username) {
            access_log /var/log/nginx/audit.log audit;
            limit_req zone=login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://mastodon;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Port   443;
            # Pas de cache sur les pages d'auth
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        }

        # Bloquer /users/ aux non-connectés (pas de cookie _session_id)
        location ~ ^/users/ {
            if ($cookie__session_id = "") {
                return 302 https://mastodon.reseau.local/auth/sign_in;
            }
            limit_req zone=global burst=50 nodelay;
            proxy_pass http://mastodon;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Port   443;
        }

        # Rate limit sur l'API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://mastodon;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Port   443;
        }

        location / {
            limit_req zone=global burst=100 nodelay;

            # Pas de cache sur les pages authentifiées
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;

            proxy_pass http://mastodon;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-Forwarded-Port   443;
        }
    }
}
